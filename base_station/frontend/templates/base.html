<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F3K Base Station</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex gap-8 text-sm font-medium">
        <span class="text-yellow-400 font-bold tracking-wide">F3K BASE</span>
        <a href="/setup" class="hover:text-yellow-400 {% if active == 'setup' %}text-yellow-400{% else %}text-gray-300{% endif %}">Setup</a>
        <a href="/rounds" class="hover:text-yellow-400 {% if active == 'rounds' %}text-yellow-400{% else %}text-gray-300{% endif %}">Rounds</a>
        <a href="/run" class="hover:text-yellow-400 {% if active == 'run' %}text-yellow-400{% else %}text-gray-300{% endif %}">Run</a>
        <a href="/results" class="hover:text-yellow-400 {% if active == 'results' %}text-yellow-400{% else %}text-gray-300{% endif %}">Results</a>
        <a href="/export" class="hover:text-yellow-400 {% if active == 'export' %}text-yellow-400{% else %}text-gray-300{% endif %}">Export</a>
    </nav>
    <main class="{% block main_class %}p-6 max-w-4xl{% endblock %}">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
