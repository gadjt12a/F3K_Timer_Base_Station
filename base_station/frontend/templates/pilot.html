<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glide Time</title>
    <script src="/static/tailwind.js"></script>
    <script defer src="/static/alpine.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<div x-data="pilotView()" x-init="connect()" class="max-w-md mx-auto px-4 py-6 text-center">

    <div class="text-yellow-400 font-bold tracking-wide text-sm mb-4">GLIDE TIME</div>

    <!-- State badge -->
    <div :class="{ IDLE:'bg-gray-600', PREP:'bg-blue-600', WORKING:'bg-green-600',
                   LANDING:'bg-red-600' }[state] || 'bg-gray-600'"
         class="inline-block px-5 py-1 rounded-full text-sm font-bold tracking-widest uppercase mb-4"
         x-text="stateLabel()"></div>

    <!-- Countdown -->
    <div class="font-mono font-bold text-7xl leading-none mb-5"
         x-text="seconds > 0 ? fmt(seconds) : '--:--'"></div>

    <!-- Heat info -->
    <template x-if="loaded">
        <div class="space-y-1.5 mb-6">
            <div class="font-bold"
                 :class="loaded.discipline === 'F3K' ? 'text-orange-400' : 'text-fuchsia-400'"
                 x-text="loaded.comp_name"></div>
            <div class="text-lg font-semibold">
                Round <span x-text="loaded.round_no"></span> ·
                Heat <span x-text="loaded.heat"></span> ·
                Task <span class="font-mono" x-text="loaded.task"></span>
            </div>
            <div class="text-gray-400 text-sm" x-text="taskName()"></div>
            <div class="pt-3">
                <div class="text-xs text-gray-500 uppercase tracking-wide mb-1.5">Flying now</div>
                <div class="flex flex-wrap justify-center gap-1.5">
                    <template x-for="p in loaded.pilots" :key="p">
                        <span class="bg-gray-800 border border-gray-700 rounded-full px-3 py-1 text-sm"
                              x-text="p"></span>
                    </template>
                </div>
            </div>
        </div>
    </template>
    <template x-if="!loaded">
        <p class="text-gray-500 mb-6">No heat loaded — waiting for the CD.</p>
    </template>

    <a href="/leaderboard"
       class="inline-block bg-gray-800 border border-gray-700 hover:border-yellow-500 rounded-lg px-5 py-2.5 text-sm font-medium">
        View leaderboard →
    </a>

    <div class="mt-6 text-xs" :class="online ? 'text-gray-600' : 'text-red-400'"
         x-text="online ? 'live' : 'reconnecting…'"></div>
</div>

<script>
const TASKS = {{ tasks | tojson }};

function pilotView() {
    return {
        state: 'IDLE',
        seconds: 0,
        loaded: null,
        online: false,
        _tickAt: 0,
        _tickSec: 0,

        connect() {
            const ws = new WebSocket((location.protocol === 'https:' ? 'wss://' : 'ws://') + location.host + '/ws');
            ws.onopen = () => { this.online = true; };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if (msg.type === 'tick') {
                    this.state = msg.state;
                    this._tickAt = Date.now();
                    this._tickSec = msg.seconds_remaining;
                    this.loaded = {
                        comp_name: msg.competition, discipline: msg.discipline,
                        round_no: msg.round_no, heat: msg.heat, task: msg.task,
                        pilots: (msg.pilots || []).filter(p => p !== '— TBD —'),
                    };
                } else if (msg.type === 'state_change') {
                    this.state = msg.state;
                    if (msg.state === 'IDLE') { this._tickAt = 0; this.seconds = 0; }
                }
            };
            ws.onclose = () => { this.online = false; setTimeout(() => this.connect(), 3000); };
            // Interpolate between 1 s ticks so the display runs smoothly
            setInterval(() => {
                if (this._tickAt) {
                    this.seconds = Math.max(0, this._tickSec - (Date.now() - this._tickAt) / 1000);
                }
            }, 200);
        },

        stateLabel() {
            return { IDLE: 'Waiting', PREP: 'Prep', WORKING: 'Working time',
                     LANDING: 'Landing' }[this.state] || this.state;
        },

        taskName() {
            if (!this.loaded) return '';
            const t = (TASKS[this.loaded.discipline] || {})[this.loaded.task];
            return t ? t.name : '';
        },

        fmt(s) {
            const si = Math.floor(s);
            return `${Math.floor(si / 60)}:${String(si % 60).padStart(2, '0')}`;
        },
    };
}
</script>
</body>
</html>
